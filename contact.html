    <!-- Contact page content  -->
    

    

    <article class="contact">
        <form onsubmit="return validateForm(event)">
            <h3> contact Fatimah:  </h3>
            <label class="labels"> Name: </label>
            <input type="text" id="name" name="fnmae" size="20" maxlength="25" placeholder="Enter your name">

            <br /> <br />

            <label class="labels"> Last Name: </label>
            <input type="text" id="lastName" name="lnmae" size="20" maxlength="25" placeholder="Enter your last name">

            <br /> <br />

            <label class="labels"> Email: </label>
            <input type="email" id="email" name="useremail" placeholder="name@gamil.com">

            <br /> <br />

            <label class="labels"> Subject: </label>
            <input type="text" id="subject" name="subject" class="contact-input" placeholder="e.g.Question">

            <br /> <br />

            <div class="form-group">
                <label class="labels"> Message: </label>
                <textarea class="textarea" id="message" name="message" rows="4" cols="30" placeholder="Write your inquiry..."></textarea>
            </div>

            <br /> <br />
            <label  class="labels" id="captchaQuestion"></label>
            <input type="text" id="captchaAnswer" placeholder="Enter answer">
            <br /> <br />

            <input type="submit" value="Submit" class="btn">
            <input type="reset" value="Reset" class="btn">

        </form>
    </article>
